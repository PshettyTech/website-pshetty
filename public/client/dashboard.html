<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Pshetty Tech Client Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/client/client.css">
</head>
<body>
    <div class="portal">
        <!-- Sidebar -->
        <aside class="portal-sidebar">
            <div class="sidebar-header">
                <img src="/assets/logo.png" alt="Pshetty Tech">
                <span>Pshetty Tech</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/client/dashboard.html" class="sidebar-link active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="#" class="sidebar-link" id="nav-project"><i class="fas fa-project-diagram"></i> Project</a>
                <a href="#" class="sidebar-link" id="nav-updates"><i class="fas fa-stream"></i> Updates</a>
                <a href="#" class="sidebar-link" id="nav-meetings"><i class="fas fa-video"></i> Meetings <span class="sidebar-badge" id="meeting-badge" style="display:none;">0</span></a>
                <a href="#" class="sidebar-link" id="nav-invoices"><i class="fas fa-file-invoice-dollar"></i> Invoices</a>
                <a href="/client/contract.html" class="sidebar-link"><i class="fas fa-file-contract"></i> Contract</a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-user-avatar" id="user-avatar">?</div>
                <div class="sidebar-user-info">
                    <div class="name" id="user-name">Client</div>
                    <div class="role">Client Portal</div>
                </div>
                <button class="sidebar-logout" id="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </aside>

        <!-- Main -->
        <main class="portal-main">
            <!-- Top Bar -->
            <header class="portal-topbar">
                <h1 id="page-title">Dashboard</h1>
                <div class="topbar-actions">
                    <div style="position:relative;">
                        <button class="notification-bell" id="notif-bell">
                            <i class="fas fa-bell"></i>
                            <span class="badge" id="notif-count" style="display:none;">0</span>
                        </button>
                        <div class="notif-dropdown" id="notif-dropdown">
                            <div class="notif-header">
                                <h3>Notifications</h3>
                                <button id="mark-all-read">Mark all read</button>
                            </div>
                            <div id="notif-list"></div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="portal-content" id="portal-content">
                <!-- Populated by JS -->
                <div style="text-align:center;padding:80px 0;color:var(--text-muted);">
                    <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--accent);"></i>
                    <p style="margin-top:16px;">Loading dashboard...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/client/client.js"></script>
</body>
</html>
